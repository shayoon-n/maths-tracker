<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker</title>
    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #fafafa;
            --border: #e0e0e0;
            --text-main: #000000;
            --sidebar-width: 280px;
            --point-green: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            touch-action: none; /* 브라우저 기본 제스처 방지 */
        }

        /* 사이드바 정렬 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }

        input[type="date"] {
            color: var(--point-green);
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-create { background: #000; color: #fff; }
        .btn-save { background: #666; color: #fff; margin-top: 5px; }

        .history-title { font-size: 11px; font-weight: 700; color: #999; margin: 30px 0 15px; letter-spacing: 1px; }
        .history-list { display: flex; flex-direction: column; gap: 20px; }
        .history-item { padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .history-info { font-size: 14px; margin-bottom: 10px; display: block; line-height: 1.5; }
        
        .history-actions { display: flex; gap: 8px; }
        .btn-load { background: #eee; color: #000; flex: 1; padding: 10px; font-size: 12px; border-radius: 6px; }
        .btn-del { background: #fff; color: #ff3b30; border: 1px solid #ff3b30; flex: 1; padding: 10px; font-size: 12px; border-radius: 6px; }

        /* 메인 영역 */
        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
        }

        .status-header { margin-bottom: 40px; text-align: center; }
        .progress-text { font-size: 28px; font-weight: 300; }

        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 8px;
            padding: 10px;
            touch-action: none;
            user-select: none;
        }

        .box {
            width: 32px;
            height: 32px;
            border: 1px solid #d1d1d1;
            border-radius: 4px;
            background: #fff;
            box-sizing: border-box;
        }

        .box.filled-past { background-color: #bbbbbb; border-color: #bbbbbb; }
        .box.filled-today { background-color: #000000; border-color: #000000; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="text" id="nameInput" placeholder="공부 항목 이름">
            <input type="number" id="totalInput" placeholder="총 문제 수">
            <button class="btn-create" onclick="createNew()">CREATE</button>
            <button id="saveBtn" class="btn-save" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
        </div>

        <div class="history-title">SAVED RECORDS</div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="main-content">
        <div class="status-header">
            <div id="statusInfo" class="progress-text">0 / 0 (0%)</div>
        </div>
        <div id="trackerGrid" class="tracker-grid"></div>
    </div>

    <script>
        let currentData = { id: null, name: '', date: '', total: 0, state: [] };
        let isDragging = false;
        let startIndex = -1;

        const grid = document.getElementById('trackerGrid');
        const dateInput = document.getElementById('dateInput');
        dateInput.valueAsDate = new Date();

        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            if (!total) return;
            currentData = {
                id: Date.now(),
                name: document.getElementById('nameInput').value || 'No Title',
                date: dateInput.value,
                total: total,
                state: Array(total).fill(null)
            };
            render();
            document.getElementById('saveBtn').style.display = 'block';
        }

        function render() {
            grid.innerHTML = '';
            const today = dateInput.value;
            currentData.state.forEach((dateVal, idx) => {
                const box = document.createElement('div');
                box.className = 'box';
                box.dataset.index = idx;
                if (dateVal) {
                    box.classList.add(dateVal === today ? 'filled-today' : 'filled-past');
                }
                grid.appendChild(box);
            });
            updateStatus();
        }

        function updateStatus() {
            const solved = currentData.state.filter(s => s).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        // --- 드래그 로직 (애플펜슬 최적화) ---

        function handlePointer(e) {
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (!target || !target.classList.contains('box')) return null;
            return parseInt(target.dataset.index);
        }

        grid.addEventListener('pointerdown', (e) => {
            const idx = handlePointer(e);
            if (idx !== null) {
                isDragging = true;
                startIndex = idx;
                processFill(idx);
                grid.setPointerCapture(e.pointerId);
            }
        });

        grid.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const idx = handlePointer(e);
            if (idx !== null) {
                processFill(idx);
            }
        });

        grid.addEventListener('pointerup', () => {
            isDragging = false;
            startIndex = -1;
        });

        function processFill(targetIdx) {
            const today = dateInput.value;
            const solvedCount = currentData.state.filter(s => s).length;

            // 순차적 입력 로직: 현재 채워진 마지막 인덱스 찾기
            let lastFilledIdx = -1;
            for(let i = currentData.state.length - 1; i >= 0; i--) {
                if (currentData.state[i]) {
                    lastFilledIdx = i;
                    break;
                }
            }

            // 채우기: 타겟 인덱스가 현재 채워진 끝점보다 뒤에 있을 때
            if (targetIdx > lastFilledIdx) {
                for (let i = 0; i <= targetIdx; i++) {
                    if (!currentData.state[i]) currentData.state[i] = today;
                }
            } 
            // 지우기: 타겟 인덱스가 채워진 영역 안쪽일 때 (뒤에서부터 지움)
            else if (targetIdx <= lastFilledIdx) {
                for (let i = currentData.state.length - 1; i > targetIdx; i--) {
                    currentData.state[i] = null;
                }
            }
            render();
        }

        // --- 저장 및 관리 로직 ---

        function saveData() {
            let logs = JSON.parse(localStorage.getItem('math_logs_v4') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            if (idx > -1) logs[idx] = JSON.parse(JSON.stringify(currentData));
            else logs.push(JSON.parse(JSON.stringify(currentData)));
            localStorage.setItem('math_logs_v4', JSON.stringify(logs));
            alert('SAVED');
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('math_logs_v4') || '[]');
            list.innerHTML = '';
            logs.reverse().forEach(log => {
                const solved = log.state.filter(s => s).length;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-info"><strong>${log.name}</strong><br>${log.date} (${solved}/${log.total})</span>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DELETE</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_logs_v4') || '[]');
            const target = logs.find(l => l.id === id);
            if (target) {
                currentData = JSON.parse(JSON.stringify(target));
                document.getElementById('nameInput').value = currentData.name;
                document.getElementById('totalInput').value = currentData.total;
                dateInput.value = currentData.date;
                render();
                document.getElementById('saveBtn').style.display = 'block';
            }
        }

        function deleteData(id) {
            if (!confirm('정말 삭제할까요?')) return;
            let logs = JSON.parse(localStorage.getItem('math_logs_v4') || '[]');
            localStorage.setItem('math_logs_v4', JSON.stringify(logs.filter(l => l.id !== id)));
            renderHistory();
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
