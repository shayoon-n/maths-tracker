<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker - Multi-Day</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #ffffff;
            --border: #eeeeee;
            --text-grey: #999999;
            --dark-green: #166534;
            --sidebar-width: 280px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: #000000;
            overflow: hidden;
            touch-action: none;
        }

        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-bottom: 40px;
        }

        .sidebar input {
            display: block;
            width: 100%;
            height: 50px;
            padding: 0 15px;
            border-radius: 12px;
            font-size: 16px;
            border: 1px solid var(--border);
            background: #ffffff;
            outline: none;
            line-height: normal;
            display: flex;
            align-items: center;
        }

        /* 날짜 입력창 디자인 및 중앙 정렬 */
        input[type="date"] {
            color: var(--dark-green) !important;
            font-weight: 700;
            text-align: center;
            justify-content: center;
        }

        input::placeholder { color: #cccccc; }

        .sidebar button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 50px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--text-grey);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-title { 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--text-grey); 
            margin-bottom: 20px; 
            letter-spacing: 1px; 
            text-transform: uppercase;
        }

        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item { padding: 15px 0; border-bottom: 1px solid #f5f5f5; }
        .history-info { font-size: 14px; margin-bottom: 10px; display: block; line-height: 1.5; }
        
        .history-actions { display: flex; gap: 8px; }
        .btn-load { height: 35px !important; flex: 1; font-size: 11px !important; }
        .btn-del { 
            height: 35px !important; flex: 1.2; font-size: 11px !important;
            color: #ff3b30 !important; border-color: #ffe5e5 !important;
        }

        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-header { margin-bottom: 40px; }
        .progress-text { font-size: 32px; font-weight: 300; }

        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 6px;
            padding: 10px;
            user-select: none;
        }

        .box {
            width: 22px;
            height: 22px;
            border: 1px solid #eeeeee;
            border-radius: 4px;
            background: #ffffff;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        /* 날짜에 따라 JS에서 배경색을 직접 제어하므로 filled 클래스는 보조적으로 사용 */
        .box.filled { border-color: transparent; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="text" id="nameInput" placeholder="항목 이름">
            <input type="number" id="totalInput" placeholder="총 문제 수">
            <button class="btn-create" onclick="createNew()">CREATE</button>
            <button id="saveBtn" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
        </div>

        <div class="history-title">SAVED RECORDS</div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="main-content">
        <div class="status-header">
            <div id="statusInfo" class="progress-text">0 / 0 (0%)</div>
        </div>
        <div id="trackerGrid" class="tracker-grid"></div>
    </div>

    <script>
        // state 배열에는 이제 단순히 true/false가 아니라 해당 칸을 칠한 '날짜 문자열'이 들어갑니다.
        let currentData = { id: null, name: '', date: '', total: 0, state: [] };
        let isDragging = false;

        const grid = document.getElementById('trackerGrid');
        const dateInput = document.getElementById('dateInput');
        
        // 오늘 날짜 세팅
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;

        // 날짜가 바뀔 때마다 그리드를 다시 그려 농도를 조절함
        dateInput.addEventListener('change', () => {
            if (currentData.id) render();
        });

        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            const name = document.getElementById('nameInput').value;
            if (!total || total <= 0) return;

            currentData = {
                id: Date.now(),
                name: name || '무제',
                date: dateInput.value,
                total: total,
                state: Array(total).fill(null) // null 이면 빈칸
            };
            render();
            document.getElementById('saveBtn').style.display = 'flex';
        }

        function render() {
            grid.innerHTML = '';
            const selectedDate = dateInput.value;

            currentData.state.forEach((dateVal, idx) => {
                const box = document.createElement('div');
                box.className = 'box';
                box.dataset.index = idx;

                if (dateVal) {
                    box.classList.add('filled');
                    // 농도 계산 로직
                    if (dateVal === selectedDate) {
                        box.style.backgroundColor = '#000000'; // 선택한 날짜는 완전 검정
                    } else {
                        // 날짜 차이에 따른 농도 조절 (더 옛날일수록 연해짐)
                        const diffDays = Math.floor((new Date(selectedDate) - new Date(dateVal)) / (1000 * 60 * 60 * 24));
                        
                        if (diffDays > 0) {
                            // 과거 날짜: 차이에 따라 투명도 조절 (0.2 ~ 0.6 범위)
                            const opacity = Math.max(0.2, 0.6 - (diffDays * 0.05));
                            box.style.backgroundColor = `rgba(0, 0, 0, ${opacity})`;
                        } else {
                            // 미래 날짜 기록이 있다면 (거의 없겠지만) 연한 회색 처리
                            box.style.backgroundColor = '#dddddd';
                        }
                    }
                }
                grid.appendChild(box);
            });
            updateStatus();
        }

        function updateStatus() {
            const solved = currentData.state.filter(s => s !== null).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        function handlePointer(e) {
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (!target || !target.classList.contains('box')) return null;
            return parseInt(target.dataset.index);
        }

        grid.addEventListener('pointerdown', (e) => {
            const idx = handlePointer(e);
            if (idx !== null) {
                isDragging = true;
                processFill(idx);
                grid.setPointerCapture(e.pointerId);
            }
        });

        grid.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const idx = handlePointer(e);
            if (idx !== null) processFill(idx);
        });

        grid.addEventListener('pointerup', () => { isDragging = false; });

        function processFill(targetIdx) {
            const currentSelectedDate = dateInput.value;
            const newState = [...currentData.state];
            
            // 마지막으로 채워진 인덱스 찾기
            let lastFilledIdx = -1;
            for(let i = 0; i < newState.length; i++) {
                if(newState[i] !== null) lastFilledIdx = i;
            }

            if (targetIdx > lastFilledIdx) {
                // 앞으로 채울 때는: 빈 칸만 현재 날짜로 채움
                for (let i = 0; i <= targetIdx; i++) {
                    if (newState[i] === null) newState[i] = currentSelectedDate;
                }
            } else {
                // 뒤로 지울 때는: 선택한 칸 이후를 모두 비움
                for (let i = newState.length - 1; i > targetIdx; i--) {
                    newState[i] = null;
                }
            }

            currentData.state = newState;
            render();
        }

        function saveData() {
            let logs = JSON.parse(localStorage.getItem('math_tracker_multi_v1') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            if (idx > -1) logs[idx] = JSON.parse(JSON.stringify(currentData));
            else logs.push(JSON.parse(JSON.stringify(currentData)));
            localStorage.setItem('math_tracker_multi_v1', JSON.stringify(logs));
            renderHistory();
            alert("저장되었습니다.");
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('math_tracker_multi_v1') || '[]');
            list.innerHTML = '';
            
            logs.slice().reverse().forEach(log => {
                const solved = log.state.filter(s => s !== null).length;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-info"><strong>${log.name}</strong><br>${log.date} (${solved}/${log.total})</span>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DELETE</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_tracker_multi_v1') || '[]');
            const target = logs.find(l => l.id === id);
            if (target) {
                currentData = JSON.parse(JSON.stringify(target));
                document.getElementById('nameInput').value = currentData.name;
                document.getElementById('totalInput').value = currentData.total;
                dateInput.value = currentData.date;
                render();
                document.getElementById('saveBtn').style.display = 'flex';
            }
        }

        function deleteData(id) {
            if(!confirm("기록을 삭제할까요?")) return;
            let logs = JSON.parse(localStorage.getItem('math_tracker_multi_v1') || '[]');
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('math_tracker_multi_v1', JSON.stringify(logs));
            renderHistory();
        }

        renderHistory();
    </script>
</body>
</html>
