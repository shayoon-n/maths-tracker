<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker - Muted Green</title>
    <style>
        * {
            box-sizing: border-box !important;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f7f7f7;
            --border-color: #e0e0e0;
            --box-border: #cccccc;
            --text-grey: #999999;
            --muted-green: #2d5a27;
            --muted-red: #d55454;
            --sidebar-width: 280px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg-main);
            color: #000000;
            overflow: hidden;
            touch-action: none;
        }

        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid #eeeeee;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: 40px;
        }

        .sidebar input {
            width: 100% !important;
            height: 50px;
            padding: 0 15px;
            border-radius: 10px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0 !important;
        }

        input[type="date"] {
            color: var(--muted-green) !important;
            font-weight: 700;
            -webkit-appearance: none;
            appearance: none;
        }

        input::placeholder { color: #aaaaaa; }

        .sidebar button.main-btn {
            width: 100% !important;
            height: 50px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: #ffffff;
            color: var(--text-grey);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-create { margin-bottom: 5px; }

        .history-title { 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--text-grey); 
            margin: 30px 0 20px; 
            letter-spacing: 1.2px; 
            text-transform: uppercase;
        }

        .history-list { display: flex; flex-direction: column; gap: 20px; }
        .history-item { padding-bottom: 20px; border-bottom: 1px solid #eeeeee; }
        .history-info { font-size: 14px; margin-bottom: 12px; display: block; line-height: 1.5; font-weight: 600; }
        
        .history-actions { display: flex; gap: 8px; align-items: center; }
        
        .btn-load { 
            background: #eeeeee !important; 
            color: #000000 !important; 
            border: none !important;
            width: 70px !important;
            height: 40px !important;
            border-radius: 8px !important;
            font-size: 11px !important;
            font-weight: 700 !important;
        }
        
        .btn-del { 
            background: #ffffff !important; 
            color: var(--muted-red) !important; 
            border: 1.5px solid var(--muted-red) !important; 
            flex: 1 !important;
            height: 40px !important;
            border-radius: 8px !important;
            font-size: 11px !important;
            font-weight: 700 !important;
        }

        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-header { margin-bottom: 40px; }
        .progress-text { font-size: 32px; font-weight: 300; }

        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 8px;
            padding: 10px;
            user-select: none;
        }

        .box {
            width: 28px;
            height: 28px;
            border: 1px solid var(--box-border);
            border-radius: 5px;
            background: #ffffff;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        .box.filled { border-color: transparent; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="text" id="nameInput" placeholder="항목 이름">
            <input type="number" id="totalInput" placeholder="총 문제 수">
            <button class="main-btn btn-create" onclick="createNew()">CREATE</button>
            <button id="saveBtn" class="main-btn btn-save" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
        </div>

        <div class="history-title">SAVED RECORDS</div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="main-content">
        <div class="status-header">
            <div id="statusInfo" class="progress-text">0 / 0 (0%)</div>
        </div>
        <div id="trackerGrid" class="tracker-grid"></div>
    </div>

    <script>
        let currentData = { id: null, name: '', date: '', total: 0, state: [] };
        let isDragging = false;

        const grid = document.getElementById('trackerGrid');
        const dateInput = document.getElementById('dateInput');
        
        const todayStr = new Date().toISOString().split('T')[0];
        dateInput.value = todayStr;

        dateInput.addEventListener('change', () => { if (currentData.id) render(); });

        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            const name = document.getElementById('nameInput').value;
            if (!total || total <= 0) return;

            currentData = {
                id: Date.now(),
                name: name || '무제',
                date: dateInput.value,
                total: total,
                state: Array(total).fill(null)
            };
            render();
            document.getElementById('saveBtn').style.display = 'block';
        }

        function render() {
            grid.innerHTML = '';
            const selectedDate = dateInput.value;

            currentData.state.forEach((dateVal, idx) => {
                const box = document.createElement('div');
                box.className = 'box';
                box.dataset.index = idx;

                if (dateVal) {
                    box.classList.add('filled');
                    if (dateVal === selectedDate) {
                        box.style.backgroundColor = 'var(--muted-green)';
                    } else {
                        const diffDays = Math.floor((new Date(selectedDate) - new Date(dateVal)) / (1000 * 60 * 60 * 24));
                        const opacity = Math.max(0.15, 0.6 - (diffDays * 0.1));
                        box.style.backgroundColor = `rgba(45, 90, 39, ${opacity})`;
                    }
                }
                grid.appendChild(box);
            });
            updateStatus();
        }

        function updateStatus() {
            const solved = currentData.state.filter(s => s !== null).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        function handlePointer(e) {
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (!target || !target.classList.contains('box')) return null;
            return parseInt(target.dataset.index);
        }

        grid.addEventListener('pointerdown', (e) => {
            const idx = handlePointer(e);
            if (idx !== null) {
                isDragging = true;
                processFill(idx);
                grid.setPointerCapture(e.pointerId);
            }
        });

        grid.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const idx = handlePointer(e);
            if (idx !== null) processFill(idx, true); // 드래그 중임을 표시
        });

        grid.addEventListener('pointerup', () => { isDragging = false; });

        // 수정한 로직 부분
        function processFill(targetIdx, dragging = false) {
            const currentSelectedDate = dateInput.value;
            const newState = [...currentData.state];
            
            // 현재 마지막으로 채워진 인덱스 찾기
            let lastFilledIdx = -1;
            for(let i = 0; i < newState.length; i++) {
                if(newState[i] !== null) lastFilledIdx = i;
            }

            if (targetIdx > lastFilledIdx) {
                // 클릭한 곳이 마지막 채워진 곳보다 뒤라면: 클릭한 곳까지 채움
                for (let i = 0; i <= targetIdx; i++) {
                    if (newState[i] === null) newState[i] = currentSelectedDate;
                }
            } else if (targetIdx === lastFilledIdx && !dragging) {
                // 클릭한 곳이 정확히 마지막 채워진 곳이고 드래그가 아닐 때: 해당 칸 비움 (토글)
                newState[targetIdx] = null;
            } else {
                // 클릭한 곳이 마지막보다 앞이라면: 클릭한 곳 이후를 모두 비움
                for (let i = newState.length - 1; i > targetIdx; i--) {
                    newState[i] = null;
                }
            }
            currentData.state = newState;
            render();
        }

        function saveData() {
            let logs = JSON.parse(localStorage.getItem('math_logs_muted_v1') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            if (idx > -1) logs[idx] = JSON.parse(JSON.stringify(currentData));
            else logs.push(JSON.parse(JSON.stringify(currentData)));
            localStorage.setItem('math_logs_muted_v1', JSON.stringify(logs));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('math_logs_muted_v1') || '[]');
            list.innerHTML = '';
            logs.slice().reverse().forEach(log => {
                const solved = log.state.filter(s => s !== null).length;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-info"><strong>${log.name}</strong><br>${log.date} (${solved}/${log.total})</span>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DELETE</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_logs_muted_v1') || '[]');
            const target = logs.find(l => l.id === id);
            if (target) {
                currentData = JSON.parse(JSON.stringify(target));
                document.getElementById('nameInput').value = currentData.name;
                document.getElementById('totalInput').value = currentData.total;
                dateInput.value = currentData.date;
                render();
                document.getElementById('saveBtn').style.display = 'block';
            }
        }

        function deleteData(id) {
            if(!confirm("삭제하시겠습니까?")) return;
            let logs = JSON.parse(localStorage.getItem('math_logs_muted_v1') || '[]');
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('math_logs_muted_v1', JSON.stringify(logs));
            renderHistory();
        }

        renderHistory();
    </script>
</body>
</html>
