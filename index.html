<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker - Final Pro</title>
    <style>
        * {
            box-sizing: border-box; /* 1) 폭 오차 방지의 핵심 */
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f7f7f7; /* 4) 사이드바 연회색 */
            --border-color: #dddddd;
            --box-border: #cccccc; /* 3) 네모칸 테두리 살짝 진하게 */
            --text-grey: #999999;
            --dark-green: #166534;
            --sidebar-width: 280px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg-main);
            color: #000000;
            overflow: hidden;
            touch-action: none;
        }

        /* 1, 4) 사이드바 디자인 및 폭 정렬 */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid #eeeeee;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-bottom: 40px;
        }

        /* 모든 입력창 폭 완전 일치 */
        .sidebar input {
            width: 100%;
            height: 50px;
            padding: 0 15px;
            border-radius: 10px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
            background: #ffffff;
            outline: none;
            display: flex;
            align-items: center;
        }

        /* 날짜 입력창: 중앙 정렬 및 디자인 */
        input[type="date"] {
            color: var(--dark-green) !important;
            font-weight: 700;
            text-align: center;
            justify-content: center;
            appearance: none;
            -webkit-appearance: none;
        }

        input::placeholder { color: #aaaaaa; }

        /* 버튼 디자인: SAVED RECORDS와 같은 회색 글씨 */
        .sidebar button {
            width: 100%;
            height: 50px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            background: #ffffff;
            color: var(--text-grey);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history-title { 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--text-grey); 
            margin-bottom: 20px; 
            letter-spacing: 1.2px; 
            text-transform: uppercase;
        }

        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item { padding: 15px 0; border-bottom: 1px solid #eeeeee; }
        .history-info { font-size: 14px; margin-bottom: 10px; display: block; line-height: 1.5; font-weight: 500; }
        
        .history-actions { display: flex; gap: 8px; }
        .btn-load { height: 35px !important; flex: 1; font-size: 11px !important; }
        .btn-del { 
            height: 35px !important; flex: 1.2; font-size: 11px !important;
            color: #ff3b30 !important; border-color: #ffcccc !important;
        }

        /* 메인 콘텐츠 영역 */
        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-main);
        }

        .status-header { margin-bottom: 50px; }
        .progress-text { font-size: 32px; font-weight: 300; letter-spacing: -0.5px; }

        /* 2, 3) 네모칸 크기 및 테두리 수정 */
        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 8px;
            padding: 10px;
            user-select: none;
        }

        .box {
            width: 28px; /* 크기 수정 */
            height: 28px; /* 크기 수정 */
            border: 1px solid var(--box-border); /* 테두리 조금 더 진하게 */
            border-radius: 5px;
            background: #ffffff;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        .box.filled { border-color: transparent; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="text" id="nameInput" placeholder="항목 이름">
            <input type="number" id="totalInput" placeholder="총 문제 수">
            <button class="btn-create" onclick="createNew()">CREATE</button>
            <button id="saveBtn" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
        </div>

        <div class="history-title">SAVED RECORDS</div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="main-content">
        <div class="status-header">
            <div id="statusInfo" class="progress-text">0 / 0 (0%)</div>
        </div>
        <div id="trackerGrid" class="tracker-grid"></div>
    </div>

    <script>
        let currentData = { id: null, name: '', date: '', total: 0, state: [] };
        let isDragging = false;

        const grid = document.getElementById('trackerGrid');
        const dateInput = document.getElementById('dateInput');
        
        // 날짜 기본값
        const todayStr = new Date().toISOString().split('T')[0];
        dateInput.value = todayStr;

        dateInput.addEventListener('change', () => { if (currentData.id) render(); });

        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            const name = document.getElementById('nameInput').value;
            if (!total || total <= 0) return;

            currentData = {
                id: Date.now(),
                name: name || 'No Title',
                date: dateInput.value,
                total: total,
                state: Array(total).fill(null)
            };
            render();
            document.getElementById('saveBtn').style.display = 'flex';
        }

        function render() {
            grid.innerHTML = '';
            const selectedDate = dateInput.value;

            currentData.state.forEach((dateVal, idx) => {
                const box = document.createElement('div');
                box.className = 'box';
                box.dataset.index = idx;

                if (dateVal) {
                    box.classList.add('filled');
                    if (dateVal === selectedDate) {
                        box.style.backgroundColor = '#000000';
                    } else {
                        const diffDays = Math.floor((new Date(selectedDate) - new Date(dateVal)) / (1000 * 60 * 60 * 24));
                        const opacity = Math.max(0.15, 0.5 - (diffDays * 0.08));
                        box.style.backgroundColor = `rgba(0, 0, 0, ${opacity})`;
                    }
                }
                grid.appendChild(box);
            });
            updateStatus();
        }

        function updateStatus() {
            const solved = currentData.state.filter(s => s !== null).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        function handlePointer(e) {
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (!target || !target.classList.contains('box')) return null;
            return parseInt(target.dataset.index);
        }

        grid.addEventListener('pointerdown', (e) => {
            const idx = handlePointer(e);
            if (idx !== null) {
                isDragging = true;
                processFill(idx);
                grid.setPointerCapture(e.pointerId);
            }
        });

        grid.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const idx = handlePointer(e);
            if (idx !== null) processFill(idx);
        });

        grid.addEventListener('pointerup', () => { isDragging = false; });

        function processFill(targetIdx) {
            const currentSelectedDate = dateInput.value;
            const newState = [...currentData.state];
            
            let lastFilledIdx = -1;
            for(let i = 0; i < newState.length; i++) {
                if(newState[i] !== null) lastFilledIdx = i;
            }

            if (targetIdx > lastFilledIdx) {
                for (let i = 0; i <= targetIdx; i++) {
                    if (newState[i] === null) newState[i] = currentSelectedDate;
                }
            } else {
                for (let i = newState.length - 1; i > targetIdx; i--) {
                    newState[i] = null;
                }
            }
            currentData.state = newState;
            render();
        }

        function saveData() {
            let logs = JSON.parse(localStorage.getItem('math_logs_vFinal') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            if (idx > -1) logs[idx] = JSON.parse(JSON.stringify(currentData));
            else logs.push(JSON.parse(JSON.stringify(currentData)));
            localStorage.setItem('math_logs_vFinal', JSON.stringify(logs));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('math_logs_vFinal') || '[]');
            list.innerHTML = '';
            logs.slice().reverse().forEach(log => {
                const solved = log.state.filter(s => s !== null).length;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-info"><strong>${log.name}</strong><br>${log.date} (${solved}/${log.total})</span>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DELETE</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_logs_vFinal') || '[]');
            const target = logs.find(l => l.id === id);
            if (target) {
                currentData = JSON.parse(JSON.stringify(target));
                document.getElementById('nameInput').value = currentData.name;
                document.getElementById('totalInput').value = currentData.total;
                dateInput.value = currentData.date;
                render();
                document.getElementById('saveBtn').style.display = 'flex';
            }
        }

        function deleteData(id) {
            if(!confirm("삭제하시겠습니까?")) return;
            let logs = JSON.parse(localStorage.getItem('math_logs_vFinal') || '[]');
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('math_logs_vFinal', JSON.stringify(logs));
            renderHistory();
        }

        renderHistory();
    </script>
</body>
</html>
