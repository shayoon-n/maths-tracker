<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker</title>
    <style>
        /* 모든 요소의 여백과 박스 계산 방식 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #ffffff;
            --sidebar-bg: #fafafa;
            --border: #e0e0e0;
            --text-main: #000000;
            --sidebar-width: 280px;
            --dark-green: #166534; /* 요청하신 진한 초록색 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            touch-action: none;
        }

        /* 왼쪽 사이드바 영역 */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }

        /* 입력창 그룹: 내부 요소들이 정확히 꽉 차도록 설정 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: 30px;
        }

        /* 날짜, 텍스트 입력창, 버튼의 스타일 및 폭 통일 */
        .sidebar input, 
        .sidebar button {
            display: block;
            width: 100%; /* 부모 너비에 100% 맞춤 */
            height: 48px; /* 높이 통일 */
            padding: 0 12px;
            border-radius: 8px;
            font-size: 16px;
            border: 1px solid var(--border);
            background: #fff;
            outline: none;
            -webkit-appearance: none; /* iOS 기본 스타일 강제 제거 */
        }

        /* 날짜 입력창 텍스트 색상: 진초록 */
        input[type="date"] {
            color: var(--dark-green);
            font-weight: 700;
            font-family: inherit;
        }

        /* 버튼 스타일 */
        .sidebar button {
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: opacity 0.2s;
            padding: 0; /* 내부 패딩에 의한 틀어짐 방지 */
            line-height: 48px; /* 텍스트 중앙 정렬 */
        }

        .btn-create { background: #000; color: #fff; }
        .btn-save { background: #666; color: #fff; margin-top: 4px; }

        .history-title { 
            font-size: 11px; 
            font-weight: 700; 
            color: #aaa; 
            margin: 30px 0 15px; 
            letter-spacing: 1px; 
        }

        .history-list { display: flex; flex-direction: column; gap: 20px; }
        .history-item { padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .history-info { font-size: 14px; margin-bottom: 12px; display: block; line-height: 1.5; }
        
        /* 히스토리 버튼 폭 맞추기 */
        .history-actions { display: flex; gap: 8px; width: 100%; }
        .btn-load { background: #eee; color: #000; flex: 1; height: 38px; line-height: 38px; border-radius: 6px; font-size: 12px; }
        .btn-del { background: #fff; color: #ff3b30; border: 1px solid #ff3b30; flex: 1; height: 38px; line-height: 38px; border-radius: 6px; font-size: 12px; }

        /* 메인 콘텐츠 영역 */
        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-header { margin-bottom: 40px; }
        .progress-text { font-size: 28px; font-weight: 300; }

        /* 그리드 영역 */
        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 8px;
            padding: 10px;
            user-select: none;
        }

        .box {
            width: 32px;
            height: 32px;
            border: 1px solid #d1d1d1;
            border-radius: 4px;
            background: #fff;
        }

        .box.filled-past { background-color: #bbbbbb; border-color: #bbbbbb; }
        .box.filled-today { background-color: #000000; border-color: #000000; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="text" id="nameInput" placeholder="항목 이름">
            <input type="number" id="totalInput" placeholder="총 문제 수">
            <button class="btn-create" onclick="createNew()">CREATE</button>
            <button id="saveBtn" class="btn-save" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
        </div>

        <div class="history-title">SAVED RECORDS</div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="main-content">
        <div class="status-header">
            <div id="statusInfo" class="progress-text">0 / 0 (0%)</div>
        </div>
        <div id="trackerGrid" class="tracker-grid"></div>
    </div>

    <script>
        let currentData = { id: null, name: '', date: '', total: 0, state: [] };
        let isDragging = false;

        const grid = document.getElementById('trackerGrid');
        const dateInput = document.getElementById('dateInput');
        dateInput.valueAsDate = new Date();

        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            if (!total) return;
            currentData = {
                id: Date.now(),
                name: document.getElementById('nameInput').value || 'No Title',
                date: dateInput.value,
                total: total,
                state: Array(total).fill(null)
            };
            render();
            document.getElementById('saveBtn').style.display = 'block';
        }

        function render() {
            grid.innerHTML = '';
            const today = dateInput.value;
            currentData.state.forEach((dateVal, idx) => {
                const box = document.createElement('div');
                box.className = 'box';
                box.dataset.index = idx;
                if (dateVal) {
                    box.classList.add(dateVal === today ? 'filled-today' : 'filled-past');
                }
                grid.appendChild(box);
            });
            updateStatus();
        }

        function updateStatus() {
            const solved = currentData.state.filter(s => s).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        /* --- 애플펜슬 훑기 최적화 로직 --- */
        function handlePointer(e) {
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (!target || !target.classList.contains('box')) return null;
            return parseInt(target.dataset.index);
        }

        grid.addEventListener('pointerdown', (e) => {
            const idx = handlePointer(e);
            if (idx !== null) {
                isDragging = true;
                processFill(idx);
                grid.setPointerCapture(e.pointerId);
            }
        });

        grid.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const idx = handlePointer(e);
            if (idx !== null) processFill(idx);
        });

        grid.addEventListener('pointerup', () => { isDragging = false; });

        function processFill(targetIdx) {
            const today = dateInput.value;
            let lastFilledIdx = -1;
            for(let i = currentData.state.length - 1; i >= 0; i--) {
                if (currentData.state[i]) { lastFilledIdx = i; break; }
            }

            if (targetIdx > lastFilledIdx) {
                for (let i = 0; i <= targetIdx; i++) {
                    if (!currentData.state[i]) currentData.state[i] = today;
                }
            } else {
                for (let i = currentData.state.length - 1; i > targetIdx; i--) {
                    currentData.state[i] = null;
                }
            }
            render();
        }

        /* --- 데이터 저장 및 불러오기 --- */
        function saveData() {
            let logs = JSON.parse(localStorage.getItem('math_logs_v5') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            if (idx > -1) logs[idx] = JSON.parse(JSON.stringify(currentData));
            else logs.push(JSON.parse(JSON.stringify(currentData)));
            localStorage.setItem('math_logs_v5', JSON.stringify(logs));
            alert('SAVED');
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('math_logs_v5') || '[]');
            list.innerHTML = '';
            logs.reverse().forEach(log => {
                const solved = log.state.filter(s => s).length;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-info"><strong>${log.name}</strong><br>${log.date} (${solved}/${log.total})</span>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DELETE</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_logs_v5') || '[]');
            const target = logs.find(l => l.id === id);
            if (target) {
                currentData = JSON.parse(JSON.stringify(target));
                document.getElementById('nameInput').value = currentData.name;
                document.getElementById('totalInput').value = currentData.total;
                dateInput.value = currentData.date;
                render();
                document.getElementById('saveBtn').style.display = 'block';
            }
        }

        function deleteData(id) {
            if (!confirm('삭제하시겠습니까?')) return;
            let logs = JSON.parse(localStorage.getItem('math_logs_v5') || '[]');
            localStorage.setItem('math_logs_v5', JSON.stringify(logs.filter(l => l.id !== id)));
            renderHistory();
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
