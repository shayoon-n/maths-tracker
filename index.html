<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker - Clean White</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #ffffff;
            --border: #eeeeee;
            --text-grey: #999999; /* SAVED RECORDS와 동일한 회색 */
            --dark-green: #166534;
            --sidebar-width: 280px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: #000000;
            overflow: hidden;
            touch-action: none;
        }

        /* 사이드바 디자인 - 올 화이트 */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-bottom: 40px;
        }

        /* 입력창 공통 스타일 */
        .sidebar input {
            display: block;
            width: 100%;
            height: 55px;
            padding: 0 15px;
            border-radius: 12px;
            font-size: 16px;
            border: 1px solid var(--border);
            background: #ffffff;
            outline: none;
        }

        /* 날짜 설정: 진한 초록색, 중앙 정렬 */
        input[type="date"] {
            color: var(--dark-green) !important;
            font-weight: 700;
            text-align: center;
        }

        /* 항목 이름, 문항 수 플레이스홀더 */
        input::placeholder {
            color: #cccccc;
        }

        /* 버튼 스타일: 배경 흰색, 글씨 회색 */
        .sidebar button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 55px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--text-grey); /* 요청하신 회색 적용 */
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar button:active {
            background: #f9f9f9;
        }

        /* SAVED RECORDS 타이틀 */
        .history-title { 
            font-size: 12px; 
            font-weight: 800; 
            color: var(--text-grey); 
            margin-bottom: 20px; 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
        }

        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item { 
            padding: 20px 0; 
            border-bottom: 1px solid #f5f5f5; 
        }
        .history-info { 
            font-size: 14px; 
            margin-bottom: 12px; 
            display: block; 
            line-height: 1.6;
            font-weight: 500;
        }
        
        .history-actions { display: flex; gap: 10px; }
        
        /* 기록 관리용 버튼 */
        .btn-load { height: 40px !important; flex: 1; font-size: 12px !important; }
        .btn-del { 
            height: 40px !important; flex: 1; font-size: 12px !important;
            color: #ff3b30 !important; border-color: #ffe5e5 !important;
        }

        /* 메인 콘텐츠 구역 */
        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
        }

        .status-header { margin-bottom: 50px; }
        .progress-text { 
            font-size: 36px; 
            font-weight: 300; 
            color: #333333;
        }

        /* 20칸 그리드 설정 */
        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 10px;
            padding: 10px;
            user-select: none;
        }

        .box {
            width: 34px;
            height: 34px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            background: #ffffff;
            cursor: pointer;
        }

        /* 채워진 칸: 검은색 */
        .box.filled { 
            background-color: #000000; 
            border-color: #000000; 
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="text" id="nameInput" placeholder="항목 이름">
            <input type="number" id="totalInput" placeholder="총 문제 수">
            <button class="btn-create" onclick="createNew()">CREATE</button>
            <button id="saveBtn" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
        </div>

        <div class="history-title">SAVED RECORDS</div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="main-content">
        <div class="status-header">
            <div id="statusInfo" class="progress-text">0 / 0 (0%)</div>
        </div>
        <div id="trackerGrid" class="tracker-grid"></div>
    </div>

    <script>
        let currentData = { id: null, name: '', date: '', total: 0, state: [] };
        let isDragging = false;

        const grid = document.getElementById('trackerGrid');
        const dateInput = document.getElementById('dateInput');
        
        // 오늘 날짜 기본 세팅
        const todayStr = new Date().toISOString().split('T')[0];
        dateInput.value = todayStr;

        // 1. 트래커 생성
        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            const name = document.getElementById('nameInput').value;
            
            if (!total || total <= 0) return;

            currentData = {
                id: Date.now(),
                name: name || '무제',
                date: dateInput.value,
                total: total,
                state: Array(total).fill(false)
            };

            render();
            document.getElementById('saveBtn').style.display = 'flex';
        }

        // 2. 그리드 렌더링
        function render() {
            grid.innerHTML = '';
            currentData.state.forEach((isFilled, idx) => {
                const box = document.createElement('div');
                box.className = 'box' + (isFilled ? ' filled' : '');
                box.dataset.index = idx;
                grid.appendChild(box);
            });
            updateStatus();
        }

        function updateStatus() {
            const solved = currentData.state.filter(s => s).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        // 3. 드래그 및 터치 기능 (애플펜슬 최적화)
        function handlePointer(e) {
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (!target || !target.classList.contains('box')) return null;
            return parseInt(target.dataset.index);
        }

        grid.addEventListener('pointerdown', (e) => {
            const idx = handlePointer(e);
            if (idx !== null) {
                isDragging = true;
                processToggle(idx);
                grid.setPointerCapture(e.pointerId);
            }
        });

        grid.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const idx = handlePointer(e);
            if (idx !== null) processToggle(idx);
        });

        grid.addEventListener('pointerup', () => { isDragging = false; });

        function processToggle(targetIdx) {
            const newState = [...currentData.state];
            let lastFilled = -1;
            for(let i = 0; i < newState.length; i++) {
                if(newState[i]) lastFilled = i;
            }

            if (targetIdx > lastFilled) {
                for (let i = 0; i <= targetIdx; i++) newState[i] = true;
            } else {
                for (let i = newState.length - 1; i > targetIdx; i--) newState[i] = false;
            }

            currentData.state = newState;
            render();
        }

        // 4. 저장 및 삭제 기능
        function saveData() {
            let logs = JSON.parse(localStorage.getItem('math_tracker_clean') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            
            if (idx > -1) logs[idx] = JSON.parse(JSON.stringify(currentData));
            else logs.push(JSON.parse(JSON.stringify(currentData)));
            
            localStorage.setItem('math_tracker_clean', JSON.stringify(logs));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('math_tracker_clean') || '[]');
            list.innerHTML = '';
            
            logs.slice().reverse().forEach(log => {
                const solved = log.state.filter(s => s).length;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-info">
                        <strong>${log.name}</strong><br>
                        ${log.date} (${solved}/${log.total})
                    </span>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DEL</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_tracker_clean') || '[]');
            const target = logs.find(l => l.id === id);
            if (target) {
                currentData = JSON.parse(JSON.stringify(target));
                document.getElementById('nameInput').value = currentData.name;
                document.getElementById('totalInput').value = currentData.total;
                dateInput.value = currentData.date;
                render();
                document.getElementById('saveBtn').style.display = 'flex';
            }
        }

        function deleteData(id) {
            if(!confirm("삭제하시겠습니까?")) return;
            let logs = JSON.parse(localStorage.getItem('math_tracker_clean') || '[]');
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('math_tracker_clean', JSON.stringify(logs));
            renderHistory();
        }

        // 앱 시작 시 기록 불러오기
        renderHistory();

    </script>
</body>
</html>
