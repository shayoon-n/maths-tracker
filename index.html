<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker</title>
    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #fafafa;
            --border: #e0e0e0;
            --text-main: #000000;
            --text-sub: #666666;
            --sidebar-width: 280px;
            --point-green: #10b981; /* 요청하신 초록색 */
        }

        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            /* 아이패드에서 드래그 시 화면이 밀리지 않도록 설정 */
            touch-action: none;
        }

        /* 왼쪽 사이드바 정렬 및 폭 수정 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 입력창 간격 조절 */
            margin-bottom: 40px;
            width: 100%;
        }

        /* 모든 입력창과 버튼의 폭을 100%로 통일 */
        input, button {
            width: 100% !important;
            box-sizing: border-box;
            -webkit-appearance: none; /* iOS 기본 스타일 제거 */
        }

        input {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #fff;
        }

        /* 날짜 입력창 텍스트 색상을 초록색으로 변경 */
        input[type="date"] {
            color: var(--point-green);
            font-weight: 600;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-create { background: #000; color: #fff; }
        .btn-save { background: #666; color: #fff; margin-top: 5px; }
        
        /* 히스토리 버튼 정렬 */
        .history-actions {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .btn-load { background: #eee; color: #000; flex: 1; padding: 10px; font-size: 12px; }
        .btn-del { background: #fff; color: #ff3b30; border: 1px solid #ff3b30; flex: 1; padding: 10px; font-size: 12px; }

        .history-title {
            font-size: 11px;
            font-weight: 700;
            color: #999;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .history-list { display: flex; flex-direction: column; gap: 20px; }
        .history-item { padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .history-info { font-size: 14px; margin-bottom: 10px; display: block; line-height: 1.5; }

        /* 메인 콘텐츠 */
        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-header { margin-bottom: 40px; text-align: center; }
        .progress-text { font-size: 28px; font-weight: 300; }

        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 8px;
            user-select: none;
            /* 드래그 입력 중 화면 스크롤 방지 */
            touch-action: none; 
        }

        .box {
            width: 32px;
            height: 32px;
            border: 1px solid #d1d1d1;
            border-radius: 4px;
            background: #fff;
            pointer-events: auto; /* 드래그 인식을 위해 설정 */
        }

        .box.filled-past { background-color: #bbbbbb; border-color: #bbbbbb; }
        .box.filled-today { background-color: #000000; border-color: #000000; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="text" id="nameInput" placeholder="공부 항목 이름">
            <input type="number" id="totalInput" placeholder="총 문제 수">
            <button class="btn-create" onclick="createNew()">CREATE</button>
            <button id="saveBtn" class="btn-save" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
        </div>

        <div class="history-title">SAVED RECORDS</div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="main-content">
        <div class="status-header">
            <div id="statusInfo" class="progress-text">0 / 0 (0%)</div>
        </div>
        <div id="trackerGrid" class="tracker-grid"></div>
    </div>

    <script>
        let currentData = { id: null, name: '', date: '', total: 0, state: [] };
        let isDragging = false;
        
        const gridContainer = document.getElementById('trackerGrid');
        document.getElementById('dateInput').valueAsDate = new Date();

        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            if (!total) return;

            currentData = {
                id: Date.now(),
                name: document.getElementById('nameInput').value || 'No Title',
                date: document.getElementById('dateInput').value,
                total: total,
                state: Array(total).fill(null)
            };
            render();
            document.getElementById('saveBtn').style.display = 'block';
        }

        function render() {
            gridContainer.innerHTML = '';
            const today = document.getElementById('dateInput').value;

            currentData.state.forEach((dateVal, idx) => {
                const box = document.createElement('div');
                box.className = 'box';
                box.dataset.index = idx; // 인덱스 저장
                if (dateVal) {
                    box.classList.add(dateVal === today ? 'filled-today' : 'filled-past');
                }
                gridContainer.appendChild(box);
            });
            updateStatus();
        }

        // --- 애플펜슬/터치 드래그 핵심 로직 수정 ---
        
        // 터치 시작
        gridContainer.addEventListener('pointerdown', (e) => {
            if (e.target.classList.contains('box')) {
                isDragging = true;
                const idx = parseInt(e.target.dataset.index);
                toggleBox(idx);
                // 드래그 중 다른 요소 선택 방지
                e.target.setPointerCapture(e.pointerId);
            }
        });

        // 터치 이동 중 (드래그)
        gridContainer.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            // 현재 터치/펜슬 위치에 있는 요소 찾기
            const actualTarget = document.elementFromPoint(e.clientX, e.clientY);
            if (actualTarget && actualTarget.classList.contains('box')) {
                const idx = parseInt(actualTarget.dataset.index);
                toggleBox(idx);
            }
        });

        // 터치 종료
        gridContainer.addEventListener('pointerup', (e) => {
            isDragging = false;
        });

        function toggleBox(idx) {
            const today = document.getElementById('dateInput').value;
            
            // 채우기: 이전 칸이 차 있거나 첫 칸일 때만
            if (!currentData.state[idx]) {
                if (idx === 0 || currentData.state[idx - 1]) {
                    if (currentData.state[idx] !== today) {
                        currentData.state[idx] = today;
                        render();
                    }
                }
            } 
            // 지우기: 다음 칸이 비어 있거나 마지막 칸일 때만
            else {
                if (idx === currentData.state.length - 1 || !currentData.state[idx + 1]) {
                    if (currentData.state[idx] !== null) {
                        currentData.state[idx] = null;
                        render();
                    }
                }
            }
        }

        function updateStatus() {
            const solved = currentData.state.filter(s => s).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        function saveData() {
            let logs = JSON.parse(localStorage.getItem('math_logs_v3') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            if (idx > -1) logs[idx] = JSON.parse(JSON.stringify(currentData));
            else logs.push(JSON.parse(JSON.stringify(currentData)));
            localStorage.setItem('math_logs_v3', JSON.stringify(logs));
            alert('SAVED');
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('math_logs_v3') || '[]');
            list.innerHTML = '';
            logs.reverse().forEach(log => {
                const solved = log.state.filter(s => s).length;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-info"><strong>${log.name}</strong><br>${log.date} (${solved}/${log.total})</span>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DELETE</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_logs_v3') || '[]');
            const target = logs.find(l => l.id === id);
            if (target) {
                currentData = JSON.parse(JSON.stringify(target));
                document.getElementById('nameInput').value = currentData.name;
                document.getElementById('totalInput').value = currentData.total;
                document.getElementById('dateInput').value = currentData.date;
                render();
                document.getElementById('saveBtn').style.display = 'block';
                window.scrollTo(0,0);
            }
        }

        function deleteData(id) {
            if (!confirm('정말 삭제할까요?')) return;
            let logs = JSON.parse(localStorage.getItem('math_logs_v3') || '[]');
            localStorage.setItem('math_logs_v3', JSON.stringify(logs.filter(l => l.id !== id)));
            renderHistory();
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
