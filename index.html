<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Maths Tracker by Chaeeun Ahn">
    <title>Maths Tracker by Chaeeun Ahn</title>
    <style>
        * {
            box-sizing: border-box !important;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        input {
            -webkit-touch-callout: default !important;
            -webkit-user-select: auto !important;
            -moz-user-select: auto !important;
            -ms-user-select: auto !important;
            user-select: auto !important;
        }

        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f7f7f7;
            --border-color: #e0e0e0;
            --box-border: #cccccc;
            --text-grey: #999999;
            --muted-green: #2d5a27;
            --muted-red: #d55454;
            --sidebar-width: 280px;
        }

        /* 3. 화면 위아래 출렁임 방지 */
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-main);
            color: #000000;
            overflow: hidden; /* 전체 스크롤 차단 */
            overscroll-behavior: none; /* iOS 바운스 방지 */
            touch-action: none;
        }

        /* 2. 슬라이드 컨테이너 (더 부드러운 애니메이션) */
        .slider-container {
            display: flex;
            width: 200vw;
            height: 100vh;
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translateX(-100vw); /* 기본은 오른쪽(메인) 페이지 */
            will-change: transform;
        }

        .page {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-shrink: 0;
            overflow: hidden;
        }

        /* --------------------------------- */
        /* 왼쪽 페이지: SAVED RECORDS 슬라이드  */
        /* --------------------------------- */
        .records-page {
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            padding: 40px;
        }

        .records-header {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-grey);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .history-grid-container {
            flex: 1;
            overflow-y: auto; /* 기록이 많을 때만 내부 스크롤 */
            padding-bottom: 40px;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
        }

        /* 4. 기록 카드 가로 4개 배치 */
        .history-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .history-item {
            background: #ffffff;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        
        .history-info-title { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            font-size: 13px; font-weight: 700; line-height: 1.3; 
        }
        .history-info-sub { 
            font-size: 12px; font-weight: 600; color: var(--text-grey); 
        }
        .history-actions { 
            display: flex; gap: 6px; margin-top: auto; 
        }

        .btn-load { background: #eeeeee !important; color: #000000 !important; border: none !important; flex: 1.2 !important; height: 32px !important; border-radius: 6px !important; font-size: 10px !important; font-weight: 700 !important; cursor: pointer; }
        .btn-del { background: #ffffff !important; color: var(--muted-red) !important; border: 1.2px solid var(--muted-red) !important; flex: 1 !important; height: 32px !important; border-radius: 6px !important; font-size: 10px !important; font-weight: 700 !important; cursor: pointer; }

        /* --------------------------------- */
        /* 오른쪽 페이지: 기존 메인 트래커 화면  */
        /* --------------------------------- */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid #eeeeee;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: 40px;
        }

        .sidebar input {
            width: 100% !important;
            height: 50px;
            padding: 0 15px;
            border-radius: 10px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            text-align: center;
        }

        input[type="date"] { color: var(--muted-green) !important; font-weight: 700; }

        .sidebar button.main-btn {
            width: 100% !important;
            height: 50px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: #ffffff;
            color: var(--text-grey);
            text-transform: uppercase;
        }

        .color-palette {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 5px;
            padding: 10px 0;
        }

        .color-circle {
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: transform 0.1s;
        }

        .color-circle.selected { border-color: #000000; transform: scale(1.15); }

        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto; /* 트래커가 아주 길 때만 내부 스크롤 */
            display: flex;
            flex-direction: column;
            align-items: center;
            overscroll-behavior-y: contain;
        }

        .tracker-wrapper {
            display: flex;
            flex-direction: column;
            width: max-content; 
            position: relative;
        }

        .status-header { margin-bottom: 40px; display: flex; justify-content: center; align-items: center; width: 100%; position: relative; }
        .progress-text { font-size: 32px; font-weight: 300; }

        .btn-done {
            position: absolute; right: 10px; background: #ffffff; border: 1.5px solid #e0e0e0;
            color: #999999; width: 70px; height: 40px; border-radius: 8px;
            font-size: 11px; font-weight: 700; cursor: pointer; display: none; 
            align-items: center; justify-content: center;
        }
        .btn-done.is-done { border-color: #569126; color: #569126; }

        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 8px;
            padding: 10px;
            touch-action: none; /* 트래커 위에서는 브라우저 스크롤 방지 */
        }

        .box {
            width: 28px; height: 28px; border: 1px solid var(--box-border);
            border-radius: 5px; background: #ffffff; cursor: pointer;
        }

        .box.filled { border-color: transparent; }

        .motivation-text {
            position: absolute; bottom: 40px; right: 40px;
            color: #000000; font-size: 24px; font-weight: 800; z-index: 100;
        }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="slider-container" id="slider">

        <!-- [왼쪽] 기록 페이지 -->
        <div class="page records-page">
            <div class="records-header">SAVED RECORDS</div>
            <div class="history-grid-container">
                <div id="historyGrid" class="history-grid"></div>
            </div>
        </div>

        <!-- [오른쪽] 메인 트래커 페이지 -->
        <div class="page main-page">
            <div class="sidebar">
                <div class="input-group">
                    <input type="date" id="dateInput">
                    <input type="text" id="nameInput" placeholder="항목 이름">
                    <input type="number" id="totalInput" placeholder="총 문제 수">
                    <button class="main-btn btn-create" onclick="createNew()">CREATE</button>
                    <button id="saveBtn" class="main-btn btn-save" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
                    
                    <div id="colorPalette" class="color-palette" style="display: none;">
                        <div class="color-circle selected" style="background: rgba(45, 90, 39, 1);" onclick="selectColor(this, 'rgba(45, 90, 39, 1)')"></div>
                        <div class="color-circle" style="background: rgba(45, 90, 39, 0.8);" onclick="selectColor(this, 'rgba(45, 90, 39, 0.8)')"></div>
                        <div class="color-circle" style="background: rgba(45, 90, 39, 0.6);" onclick="selectColor(this, 'rgba(45, 90, 39, 0.6)')"></div>
                        <div class="color-circle" style="background: rgba(45, 90, 39, 0.4);" onclick="selectColor(this, 'rgba(45, 90, 39, 0.4)')"></div>
                        <div class="color-circle" style="background: rgba(45, 90, 39, 0.2);" onclick="selectColor(this, 'rgba(45, 90, 39, 0.2)')"></div>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div class="tracker-wrapper">
                    <div class="status-header">
                        <div id="statusInfo" class="progress-text">0 / 0 (0%)</div>
                        <button id="doneBtn" class="btn-done" onclick="toggleDone()">DONE</button>
                    </div>
                    <div id="trackerGrid" class="tracker-grid"></div>
                </div>
            </div>

            <div class="motivation-text">미적을 존나게 해</div>
        </div>

    </div>

    <script>
        let currentData = { id: null, name: '', date: '', total: 0, state: [], done: false };
        let isDraggingBox = false;
        let lastProcessedIdx = -1;
        let activeColor = 'rgba(45, 90, 39, 1)';
        let isMainPage = true;

        const slider = document.getElementById('slider');
        const grid = document.getElementById('trackerGrid');
        const dateInput = document.getElementById('dateInput');
        
        dateInput.value = new Date().toISOString().split('T')[0];

        // --- 1 & 2. 스와이프 네비게이션 로직 ---
        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            // 박스를 칠하는 중이면 페이지 이동 안함
            if (isDraggingBox) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            // 수평 이동이 수직 이동보다 클 때만 작동 (실수 방지)
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 70) {
                if (dx > 0 && !isMainPage) goToMain();      // 오른쪽으로 밀면 메인으로
                else if (dx < 0 && isMainPage) goToRecords(); // 왼쪽으로 밀면 기록으로
            }
        }, { passive: true });

        function goToRecords() {
            slider.style.transform = 'translateX(0)';
            isMainPage = false;
        }

        function goToMain() {
            slider.style.transform = 'translateX(-100vw)';
            isMainPage = true;
        }

        // --- 기존 기능 유지 ---
        function selectColor(element, color) {
            document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            activeColor = color;
        }

        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            const name = document.getElementById('nameInput').value;
            if (!total || total <= 0) return;

            currentData = {
                id: Date.now(),
                name: name || '무제',
                date: dateInput.value,
                total: total,
                state: Array(total).fill(null),
                done: false
            };
            initGridDOM();
            updateGridUI();
            document.getElementById('saveBtn').style.display = 'block';
            document.getElementById('colorPalette').style.display = 'flex';
            document.getElementById('doneBtn').style.display = 'flex';
            updateDoneBtnUI();
        }

        function initGridDOM() {
            grid.innerHTML = '';
            for (let i = 0; i < currentData.total; i++) {
                const box = document.createElement('div');
                box.className = 'box';
                box.dataset.index = i;
                grid.appendChild(box);
            }
        }

        function updateGridUI() {
            const boxes = grid.querySelectorAll('.box');
            currentData.state.forEach((stateObj, idx) => {
                const box = boxes[idx];
                if (!box) return;
                if (stateObj !== null) {
                    box.classList.add('filled');
                    box.style.backgroundColor = stateObj.color;
                } else {
                    box.classList.remove('filled');
                    box.style.backgroundColor = '#ffffff';
                }
            });
            updateStatus();
        }

        function updateStatus() {
            const solved = currentData.state.filter(s => s !== null).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        function getTargetIdx(e) {
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (!target || !target.classList.contains('box')) return null;
            return parseInt(target.dataset.index);
        }

        grid.addEventListener('pointerdown', (e) => {
            const idx = getTargetIdx(e);
            if (idx !== null) {
                isDraggingBox = true;
                lastProcessedIdx = idx;
                processFill(idx, false);
                grid.setPointerCapture(e.pointerId);
            }
        });

        grid.addEventListener('pointermove', (e) => {
            if (!isDraggingBox) return;
            const idx = getTargetIdx(e);
            if (idx !== null && idx !== lastProcessedIdx) {
                lastProcessedIdx = idx;
                processFill(idx, true);
            }
        });

        grid.addEventListener('pointerup', () => { 
            isDraggingBox = false; 
            lastProcessedIdx = -1;
        });

        function processFill(targetIdx, dragging) {
            const currentSelectedDate = dateInput.value;
            const newState = [...currentData.state];
            let lastFilledIdx = -1;
            for(let i = 0; i < newState.length; i++) { if(newState[i] !== null) lastFilledIdx = i; }

            if (targetIdx > lastFilledIdx) {
                for (let i = 0; i <= targetIdx; i++) {
                    if (newState[i] === null) newState[i] = { date: currentSelectedDate, color: activeColor };
                }
            } else if (targetIdx === lastFilledIdx && !dragging) {
                newState[targetIdx] = null;
            } else {
                for (let i = newState.length - 1; i > targetIdx; i--) newState[i] = null;
            }
            currentData.state = newState;
            updateGridUI();
        }

        function saveData() {
            currentData.name = document.getElementById('nameInput').value || '무제';
            const newTotal = parseInt(document.getElementById('totalInput').value);
            if (!isNaN(newTotal) && newTotal > 0 && newTotal !== currentData.total) {
                const oldState = currentData.state;
                currentData.total = newTotal;
                const newState = Array(newTotal).fill(null);
                for (let i = 0; i < Math.min(oldState.length, newTotal); i++) newState[i] = oldState[i];
                currentData.state = newState;
                initGridDOM();
                updateGridUI();
            }
            let logs = JSON.parse(localStorage.getItem('math_logs_muted_v1') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            if (idx > -1) logs[idx] = JSON.parse(JSON.stringify(currentData));
            else logs.push(JSON.parse(JSON.stringify(currentData)));
            localStorage.setItem('math_logs_muted_v1', JSON.stringify(logs));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyGrid');
            const logs = JSON.parse(localStorage.getItem('math_logs_muted_v1') || '[]');
            list.innerHTML = '';
            logs.slice().reverse().forEach(log => {
                const solved = log.state.filter(s => s !== null).length;
                const isDoneHtml = log.done ? `<span style="color:#569126; font-weight: 800;">✓</span>` : '';
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div class="history-info-title">
                        <span style="flex:1; padding-right:5px; word-break:break-all;">${log.name}</span>
                        ${isDoneHtml}
                    </div>
                    <div class="history-info-sub">${log.date}<br>(${solved}/${log.total})</div>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DEL</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_logs_muted_v1') || '[]');
            const target = logs.find(l => l.id === id);
            if (target) {
                currentData = JSON.parse(JSON.stringify(target));
                if (currentData.done === undefined) currentData.done = false; 
                currentData.state = currentData.state.map(s => {
                    if (s === null) return null;
                    if (typeof s === 'string') return { date: s, color: 'rgba(45, 90, 39, 1)' };
                    return s;
                });
                document.getElementById('nameInput').value = currentData.name;
                document.getElementById('totalInput').value = currentData.total;
                dateInput.value = currentData.date;
                initGridDOM();
                updateGridUI();
                document.getElementById('saveBtn').style.display = 'block';
                document.getElementById('colorPalette').style.display = 'flex';
                document.getElementById('doneBtn').style.display = 'flex';
                updateDoneBtnUI();
                goToMain(); 
            }
        }

        function deleteData(id) {
            if(!confirm("삭제하시겠습니까?")) return;
            let logs = JSON.parse(localStorage.getItem('math_logs_muted_v1') || '[]');
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('math_logs_muted_v1', JSON.stringify(logs));
            renderHistory();
        }

        function toggleDone() {
            if (!currentData.id) return;
            currentData.done = !currentData.done;
            updateDoneBtnUI();
            saveData(); 
        }

        function updateDoneBtnUI() {
            const btn = document.getElementById('doneBtn');
            if (currentData.done) btn.classList.add('is-done');
            else btn.classList.remove('is-done');
        }

        renderHistory();
    </script>
</body>
</html>
