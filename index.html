<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker</title>
    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #fafafa;
            --border: #e0e0e0;
            --text-main: #000000;
            --text-sub: #666666;
            --sidebar-width: 280px;
            --point-green: #10b981; /* 요청하신 초록색 */
        }

        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            /* 아이패드에서 드래그 시 화면이 밀리지 않도록 설정 */
            touch-action: none;
        }

        /* 왼쪽 사이드바 정렬 및 폭 수정 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 입력창 간격 조절 */
            margin-bottom: 40px;
            width: 100%;
        }

        /* 모든 입력창과 버튼의 폭을 100%로 통일 */
        input, button {
            width: 100% !important;
            box-sizing: border-box;
            -webkit-appearance: none; /* iOS 기본 스타일 제거 */
        }

        input {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #fff;
        }

        /* 날짜 입력창 텍스트 색상을 초록색으로 변경 */
        input[type="date"] {
            color: var(--point-green);
            font-weight: 600;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-create { background: #000; color: #fff; }
        .btn-save { background: #666; color: #fff; margin-top: 5px; }
        
        /* 히스토리 버튼 정렬 */
        .history-actions {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .btn-load { background: #eee; color: #000; flex: 1; padding: 10px; font-size: 12px; }
        .btn-del { background: #fff; color: #ff3b30; border: 1px solid #ff3b30; flex: 1; padding: 10px; font-size: 12px; }

        .history-title {
            font-size: 11px;
            font-weight: 700;
            color: #999;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .history-list { display: flex; flex-direction: column; gap: 20px; }
        .history-item { padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .history-info { font-size: 14px; margin-bottom: 10px; display: block; line-height: 1.5; }

        /* 메인 콘텐츠 */
        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-header { margin-bottom: 40px; text-align: center; }
        .progress-text { font-size: 28px; font-weight: 300; }

        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 8px;
            user-select: none;
            /* 드래그 입력 중 화면 스크롤 방지 */
            touch-action: none; 
        }

        .box {
            width: 32px;
            height: 32px;
            border: 1px solid #d1d1d1;
            border-radius: 4px;
            background: #fff;
            pointer-events: auto; /* 드래그 인식을 위해 설정 */
        }

        .box.filled-past { background-color: #bbbbbb; border-color: #bbbbbb; }
        .box.filled-today { background-color: #000000; border-color: #000000; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>

        <div class="input-group">
