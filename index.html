<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #ffffff;
            --sidebar-bg: #fafafa;
            --border: #e0e0e0;
            --text-main: #000000;
            --sidebar-width: 280px;
            --dark-green: #166534; /* 요청하신 진한 초록색 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            touch-action: none; /* 드래그 시 화면 밀림 방지 */
        }

        /* 왼쪽 사이드바 */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: 30px;
        }

        .sidebar input {
            display: block;
            width: 100%;
            height: 50px;
            padding: 0 15px;
            border-radius: 10px;
            font-size: 16px;
            border: 1px solid var(--border);
            background: #ffffff;
            color: #000000;
            outline: none;
        }

        /* 1) 날짜 설정: 진한 초록색 */
        input[type="date"] {
            color: var(--dark-green) !important;
            font-weight: 700;
            text-align: center;
        }

        /* 2) 항목 이름, 문항 수: 흰색 칸, 회색 글씨(placeholder) */
        input::placeholder {
            color: #aaaaaa;
        }

        .sidebar button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 50px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .btn-create { background: #000000; color: #ffffff; }
        .btn-save { background: #666666; color: #ffffff; margin-top: 5px; }

        /* 저장 기록 섹션 */
        .history-title { 
            font-size: 11px; 
            font-weight: 700; 
            color: #999999; 
            margin: 30px 0 15px; 
            letter-spacing: 1px; 
        }

        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item { 
            padding: 15px 0; 
            border-bottom: 1px solid #eeeeee; 
        }
        .history-info { 
            font-size: 14px; 
            margin-bottom: 10px; 
            display: block; 
            line-height: 1.4;
        }
        
        .history-actions { display: flex; gap: 8px; }
        .btn-load { background: #eeeeee; color: #000000; height: 35px; flex: 1; border-radius: 5px; }
        .btn-del { 
            background: #ffffff; color: #ff3b30; border: 1px solid #ff3b30; 
            height: 35px; flex: 1; border-radius: 5px; 
        }

        /* 메인 콘텐츠 구역 */
        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-header { margin-bottom: 40px; }
        .progress-text { 
            font-size: 32px; 
            font-weight: 400; 
            color: #000000;
        }

        /* 3) 가로 20개 그리드 설정 */
        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 8px;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
        }

        .box {
            width: 32px;
            height: 32px;
            border: 1px solid #d1d1d1;
            border-radius: 4px;
            background: #ffffff;
            cursor: pointer;
        }

        /* 4) 채워진 칸: 검은색 */
        .box.filled { 
            background-color: #000000; 
            border-color: #000000; 
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="text" id="nameInput" placeholder="항목 이름">
            <input type="number" id="totalInput" placeholder="총 문제 수">
            <button class="btn-create" onclick="createNew()">CREATE</button>
            <button id="saveBtn" class="btn-save" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
        </div>

        <div class="history-title">SAVED RECORDS</div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="main-content">
        <div class="status-header">
            <div id="statusInfo" class="progress-text">0 / 0 (0%)</div>
        </div>
        <div id="trackerGrid" class="tracker-grid"></div>
    </div>

    <script>
        let currentData = { id: null, name: '', date: '', total: 0, state: [] };
        let isDragging = false;

        const grid = document.getElementById('trackerGrid');
        const dateInput = document.getElementById('dateInput');
        
        // 초기 날짜 설정
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;

        // 1. 새로운 트래커 생성
        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            const name = document.getElementById('nameInput').value;
            
            if (!total || total <= 0) {
                alert("총 문제 수를 입력해주세요.");
                return;
            }

            currentData = {
                id: Date.now(),
                name: name || '무제',
                date: dateInput.value,
                total: total,
                state: Array(total).fill(false) // false: 빈칸, true: 색칠
            };

            render();
            document.getElementById('saveBtn').style.display = 'block';
        }

        // 2. 그리드 및 상태 업데이트
        function render() {
            grid.innerHTML = '';
            currentData.state.forEach((isFilled, idx) => {
                const box = document.createElement('div');
                box.className = 'box' + (isFilled ? ' filled' : '');
                box.dataset.index = idx;
                grid.appendChild(box);
            });
            updateStatus();
        }

        function updateStatus() {
            const solved = currentData.state.filter(s => s).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        // 3. 드래그/터치 로직 (애플펜슬 대응)
        function handlePointer(e) {
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (!target || !target.classList.contains('box')) return null;
            return parseInt(target.dataset.index);
        }

        grid.addEventListener('pointerdown', (e) => {
            const idx = handlePointer(e);
            if (idx !== null) {
                isDragging = true;
                toggleTo(idx);
                grid.setPointerCapture(e.pointerId);
            }
        });

        grid.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const idx = handlePointer(e);
            if (idx !== null) toggleTo(idx);
        });

        grid.addEventListener('pointerup', () => { isDragging = false; });

        // 순차적으로 채우는 로직
        function toggleTo(targetIdx) {
            // 선택한 칸까지 모두 채우기 (순차적 채우기)
            const newState = [...currentData.state];
            
            // 현재 몇 칸이나 채워져 있는지 확인
            let lastFilled = -1;
            for(let i = 0; i < newState.length; i++) {
                if(newState[i]) lastFilled = i;
            }

            if (targetIdx > lastFilled) {
                // 더 뒤를 누르면 거기까지 채움
                for (let i = 0; i <= targetIdx; i++) newState[i] = true;
            } else {
                // 이미 채워진 곳 중간을 누르면 거기서부터 뒤를 지움
                for (let i = newState.length - 1; i > targetIdx; i--) newState[i] = false;
            }

            currentData.state = newState;
            render();
        }

        // 5. 기록 저장 (LocalStorage)
        function saveData() {
            let logs = JSON.parse(localStorage.getItem('math_tracker_logs') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            
            if (idx > -1) logs[idx] = JSON.parse(JSON.stringify(currentData));
            else logs.push(JSON.parse(JSON.stringify(currentData)));
            
            localStorage.setItem('math_tracker_logs', JSON.stringify(logs));
            alert('기록이 저장되었습니다.');
            renderHistory();
        }

        // 6. 기록 목록 표시 및 삭제
        function renderHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('math_tracker_logs') || '[]');
            list.innerHTML = '';
            
            // 최신순 정렬
            logs.slice().reverse().forEach(log => {
                const solved = log.state.filter(s => s).length;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-info">
                        <strong>${log.name}</strong><br>
                        ${log.date} (${solved}/${log.total})
                    </span>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DEL</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_tracker_logs') || '[]');
            const target = logs.find(l => l.id === id);
            if (target) {
                currentData = JSON.parse(JSON.stringify(target));
                document.getElementById('nameInput').value = currentData.name;
                document.getElementById('totalInput').value = currentData.total;
                dateInput.value = currentData.date;
                render();
                document.getElementById('saveBtn').style.display = 'block';
            }
        }

        function deleteData(id) {
            if(!confirm("이 기록을 삭제할까요?")) return;
            let logs = JSON.parse(localStorage.getItem('math_tracker_logs') || '[]');
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('math_tracker_logs', JSON.stringify(logs));
            renderHistory();
        }

        // 초기 실행
        renderHistory();

    </script>
</body>
</html>
