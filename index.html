<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Math Tracker</title>
    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #fafafa;
            --border: #e0e0e0;
            --text-main: #000000;
            --text-sub: #666666;
            --sidebar-width: 260px;
        }

        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            touch-action: none; /* 드래그 선택 시 화면 스크롤 방지 */
        }

        /* 왼쪽 사이드바 정렬 수정 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            background: #fff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-create { background: #000; color: #fff; }
        .btn-save { background: #666; color: #fff; margin-top: 10px; }
        .btn-load { background: #eee; color: #000; flex: 1; padding: 8px; font-size: 12px; }
        .btn-del { background: #fff; color: #ff3b30; border: 1px solid #ff3b30; padding: 8px; font-size: 12px; }

        .history-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item { border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .history-info { font-size: 13px; margin-bottom: 8px; display: block; line-height: 1.4; }
        .history-actions { display: flex; gap: 6px; }

        /* 메인 콘텐츠 */
        .main-content {
            flex: 1;
            padding: 60px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-header { margin-bottom: 40px; text-align: center; }
        .progress-text { font-size: 28px; font-weight: 300; letter-spacing: -1px; }

        /* 그리드 가로 20칸 */
        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 6px;
            user-select: none;
        }

        .box {
            width: 28px;
            height: 28px;
            border: 1px solid #d1d1d1;
            border-radius: 2px;
            background: #fff;
            transition: background 0.2s;
        }

        /* 날짜별 무채색 농도 (오늘: 블랙, 과거: 그레이) */
        .box.filled-past { background-color: #bbbbbb; border-color: #bbbbbb; }
        .box.filled-today { background-color: #000000; border-color: #000000; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="input-group">
            <input type="date" id="dateInput">
            <input type="text" id="nameInput" placeholder="공부 항목 이름">
            <input type="number" id="totalInput" placeholder="총 문제 수">
            <button class="btn-create" onclick="createNew()">CREATE</button>
            <button id="saveBtn" class="btn-save" style="display:none;" onclick="saveData()">SAVE PROGRESS</button>
        </div>

        <div class="history-title">SAVED RECORDS</div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="main-content">
        <div class="status-header">
            <div id="statusInfo" class="progress-text">0 / 0</div>
        </div>
        <div id="trackerGrid" class="tracker-grid"></div>
    </div>

    <script>
        let currentData = { id: null, name: '', date: '', total: 0, state: [] };
        let isDragging = false;
        let dragMode = true; // true: 채우기 모드

        const gridContainer = document.getElementById('trackerGrid');
        document.getElementById('dateInput').valueAsDate = new Date();

        function createNew() {
            const total = parseInt(document.getElementById('totalInput').value);
            if (!total) return;

            currentData = {
                id: Date.now(),
                name: document.getElementById('nameInput').value || 'No Title',
                date: document.getElementById('dateInput').value,
                total: total,
                state: Array(total).fill(null) // null: 비었음, 'YYYY-MM-DD': 채워진 날짜
            };
            render();
            document.getElementById('saveBtn').style.display = 'block';
        }

        function render() {
            gridContainer.innerHTML = '';
            const today = document.getElementById('dateInput').value;

            currentData.state.forEach((dateVal, idx) => {
                const box = document.createElement('div');
                box.className = 'box';
                if (dateVal) {
                    box.classList.add(dateVal === today ? 'filled-today' : 'filled-past');
                }

                // 마우스/터치 드래그 이벤트 전용 (아이패드 최적화)
                box.onpointerdown = (e) => {
                    isDragging = true;
                    box.releasePointerCapture(e.pointerId); // 드래그 시 다른 요소 인식 허용
                    toggleBox(idx);
                };
                box.onpointerenter = () => {
                    if (isDragging) toggleBox(idx);
                };

                gridContainer.appendChild(box);
            });
            updateStatus();
        }

        // 핵심 로직: 순차적 입력 확인
        function toggleBox(idx) {
            const today = document.getElementById('dateInput').value;
            
            // 1. 채우기 조건: 첫 칸이거나 바로 앞 칸이 이미 채워져 있어야 함
            if (!currentData.state[idx]) {
                if (idx === 0 || currentData.state[idx - 1]) {
                    currentData.state[idx] = today;
                }
            } 
            // 2. 비우기 조건: 마지막 칸이거나 바로 뒷 칸이 비어 있어야 함
            else {
                if (idx === currentData.state.length - 1 || !currentData.state[idx + 1]) {
                    currentData.state[idx] = null;
                }
            }
            render();
        }

        window.onpointerup = () => { isDragging = false; };

        function updateStatus() {
            const solved = currentData.state.filter(s => s).length;
            const percent = currentData.total > 0 ? Math.round((solved / currentData.total) * 100) : 0;
            document.getElementById('statusInfo').innerText = `${solved} / ${currentData.total} (${percent}%)`;
        }

        function saveData() {
            let logs = JSON.parse(localStorage.getItem('math_logs_v2') || '[]');
            const idx = logs.findIndex(l => l.id === currentData.id);
            if (idx > -1) logs[idx] = currentData;
            else logs.push(currentData);
            localStorage.setItem('math_logs_v2', JSON.stringify(logs));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('math_logs_v2') || '[]');
            list.innerHTML = '';
            logs.reverse().forEach(log => {
                const solved = log.state.filter(s => s).length;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-info"><strong>${log.name}</strong><br>${log.date} (${solved}/${log.total})</span>
                    <div class="history-actions">
                        <button class="btn-load" onclick="loadData(${log.id})">LOAD</button>
                        <button class="btn-del" onclick="deleteData(${log.id})">DEL</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function loadData(id) {
            const logs = JSON.parse(localStorage.getItem('math_logs_v2') || '[]');
            currentData = logs.find(l => l.id === id);
            document.getElementById('nameInput').value = currentData.name;
            document.getElementById('totalInput').value = currentData.total;
            document.getElementById('dateInput').value = currentData.date;
            render();
            document.getElementById('saveBtn').style.display = 'block';
        }

        function deleteData(id) {
            if (!confirm('삭제하시겠습니까?')) return;
            let logs = JSON.parse(localStorage.getItem('math_logs_v2') || '[]');
            localStorage.setItem('math_logs_v2', JSON.stringify(logs.filter(l => l.id !== id)));
            renderHistory();
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
